# Tail-based sampling policy documentation and example
# This file is referenced by the gateway values and shows reasoning for sampling choices.

# - Always sample error spans (100%) so that issues are fully captured.
# - Sample 10% of successful requests to reduce volume yet maintain coverage for latency trends.

